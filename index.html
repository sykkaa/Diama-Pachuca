<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>DIAMA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
overflow:hidden;
background:black;
width:100vw;
height:100vh;
}

/* ENTER SCREEN */

#enterScreen{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:black;

display:flex;
justify-content:center;
align-items:center;

z-index:999;

cursor:pointer;

transition:1.5s ease;

}

#enterText{

color:white;

font-size:14px;

letter-spacing:8px;

opacity:0.85;

text-transform:uppercase;

animation:pulse 2.5s ease-in-out infinite;

}

/* FONDO */

#background{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

overflow:hidden;

background:black;

}

/* FLYER */

#flyer{

position:absolute;

width:100%;
height:100%;

object-fit:cover;

opacity:0;

animation:
fadeIn 2s ease forwards,
slowFloat 16s ease-in-out infinite alternate;

filter:
saturate(1.08)
contrast(1.05);

}

/* OVERLAY */

#overlay{

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:
linear-gradient(
to bottom,
rgba(0,0,0,0.35),
rgba(0,0,0,0.58)
);

backdrop-filter:blur(2px);

}

/* TITULO */

#mainTitle{

position:absolute;

top:4%;

left:50%;

transform:translateX(-50%);

z-index:30;

text-align:center;

pointer-events:none;

}

/* DIAMA */

#diamaTitle{

font-size:clamp(58px, 9vw, 160px);

font-weight:900;

letter-spacing:10px;

text-transform:uppercase;

line-height:0.9;

background:
linear-gradient(
90deg,
#ffffff,
#9eff00,
#00c3ff,
#ff3c00,
#ffffff
);

background-size:300% 300%;

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

animation:
gradientMove 8s ease infinite,
titleFloat 6s ease-in-out infinite;

filter:
drop-shadow(0 0 20px rgba(0,255,180,0.2))
drop-shadow(0 0 40px rgba(255,60,0,0.12));

}

/* PACHUCA */

#cityTitle{

margin-top:10px;

font-size:clamp(16px, 1.6vw, 28px);

letter-spacing:14px;

text-transform:uppercase;

font-weight:300;

color:rgba(255,255,255,0.82);

text-shadow:
0 0 20px rgba(255,255,255,0.15);

animation:
cityGlow 4s ease-in-out infinite;

}

/* ARTISTAS */

#artists3d{

position:absolute;

top:28%;

left:50%;

transform:translateX(-50%);

z-index:15;

display:flex;

flex-direction:column;

align-items:center;

gap:24px;

width:100%;

pointer-events:none;

padding:0 20px;

}

/* TEXTO ARTISTAS */

.artist{

font-size:clamp(18px, 2vw, 34px);

font-weight:300;

letter-spacing:4px;

text-transform:uppercase;

color:rgba(255,255,255,0.95);

text-align:center;

line-height:1.2;

text-shadow:

0 0 10px rgba(255,255,255,0.12),
0 0 30px rgba(0,195,255,0.08),
0 0 40px rgba(158,255,0,0.06),
0 10px 30px rgba(0,0,0,0.7);

transform:
perspective(900px)
rotateX(18deg);

animation:
floatText 6s ease-in-out infinite;

mix-blend-mode:screen;

}

/* BOTONES */

#content{

position:absolute;

bottom:7%;

left:50%;

transform:translateX(-50%);

display:flex;

flex-direction:column;

align-items:center;

gap:16px;

z-index:20;

opacity:0;

animation:contentFade 2s ease forwards;
animation-delay:1.2s;

}

.btn{

padding:14px 26px;

background:rgba(255,255,255,0.03);

border:none;

backdrop-filter:blur(20px);

-webkit-backdrop-filter:blur(20px);

color:rgba(255,255,255,0.82);

font-size:12px;

letter-spacing:6px;

text-transform:uppercase;

border-radius:999px;

cursor:pointer;

transition:0.4s ease;

min-width:240px;

box-shadow:
0 0 30px rgba(255,255,255,0.03);

}
