```html id="5l9m3k"
<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>DIAMA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
overflow:hidden;
background:black;
width:100vw;
height:100vh;
}

/* ENTER SCREEN */

#enterScreen{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:black;

display:flex;
justify-content:center;
align-items:center;

z-index:999;

cursor:pointer;

transition:1.5s ease;

}

#enterText{

color:white;

font-size:14px;

letter-spacing:8px;

opacity:0.85;

text-transform:uppercase;

animation:pulse 2.5s ease-in-out infinite;

}

/* FONDO */

#background{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

overflow:hidden;

background:black;

}

/* FLYER */

#flyer{

position:absolute;

width:100%;
height:100%;

object-fit:cover;

opacity:0;

animation:
fadeIn 2s ease forwards,
slowFloat 16s ease-in-out infinite alternate;

filter:
saturate(1.08)
contrast(1.05);

}

/* OVERLAY */

#overlay{

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:
linear-gradient(
to bottom,
rgba(0,0,0,0.35),
rgba(0,0,0,0.58)
);

backdrop-filter:blur(2px);

}

/* TITULO */

#mainTitle{

position:absolute;

top:4%;

left:50%;

transform:translateX(-50%);

z-index:30;

text-align:center;

pointer-events:none;

}

/* DIAMA */

#diamaTitle{

font-size:clamp(58px, 9vw, 160px);

font-weight:900;

letter-spacing:10px;

text-transform:uppercase;

line-height:0.9;

background:
linear-gradient(
90deg,
#ffffff,
#9eff00,
#00c3ff,
#ff3c00,
#ffffff
);

background-size:300% 300%;

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

animation:
gradientMove 8s ease infinite,
titleFloat 6s ease-in-out infinite;

filter:
drop-shadow(0 0 20px rgba(0,255,180,0.2))
drop-shadow(0 0 40px rgba(255,60,0,0.12));

}

/* PACHUCA */

#cityTitle{

margin-top:10px;

font-size:clamp(16px, 1.6vw, 28px);

letter-spacing:14px;

text-transform:uppercase;

font-weight:300;

color:rgba(255,255,255,0.82);

text-shadow:
0 0 20px rgba(255,255,255,0.15);

animation:
cityGlow 4s ease-in-out infinite;

}

/* ARTISTAS */

#artists3d{

position:absolute;

top:28%;

left:50%;

transform:translateX(-50%);

z-index:15;

display:flex;

flex-direction:column;

align-items:center;

gap:24px;

width:100%;

pointer-events:none;

padding:0 20px;

}

/* TEXTO ARTISTAS */

.artist{

font-size:clamp(18px, 2vw, 34px);

font-weight:300;

letter-spacing:4px;

text-transform:uppercase;

color:rgba(255,255,255,0.95);

text-align:center;

line-height:1.2;

text-shadow:

0 0 10px rgba(255,255,255,0.12),
0 0 30px rgba(0,195,255,0.08),
0 0 40px rgba(158,255,0,0.06),
0 10px 30px rgba(0,0,0,0.7);

transform:
perspective(900px)
rotateX(18deg);

animation:
floatText 6s ease-in-out infinite;

mix-blend-mode:screen;

}

/* BOTONES */

#content{

position:absolute;

bottom:7%;

left:50%;

transform:translateX(-50%);

display:flex;

flex-direction:column;

align-items:center;

gap:16px;

z-index:20;

opacity:0;

animation:contentFade 2s ease forwards;
animation-delay:1.2s;

}

.btn{

padding:14px 26px;

background:rgba(255,255,255,0.03);

border:none;

backdrop-filter:blur(20px);

-webkit-backdrop-filter:blur(20px);

color:rgba(255,255,255,0.82);

font-size:12px;

letter-spacing:6px;

text-transform:uppercase;

border-radius:999px;

cursor:pointer;

transition:0.4s ease;

min-width:240px;

box-shadow:
0 0 30px rgba(255,255,255,0.03);

}

.btn:hover{

transform:scale(1.04);

background:rgba(255,255,255,0.07);

color:white;

box-shadow:
0 0 40px rgba(0,195,255,0.12);

}

/* VIDEO MODAL */

#videoModal{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:black;

display:none;

justify-content:center;
align-items:center;

z-index:100;

}

/* VIDEO */

#videoPlayer{

width:100%;
height:100%;

object-fit:contain;

background:black;

}

/* CERRAR */

#closeBtn{

position:absolute;

top:20px;
right:20px;

z-index:200;

padding:12px 18px;

background:rgba(0,0,0,0.55);

color:white;

border:none;

border-radius:14px;

cursor:pointer;

font-size:12px;

letter-spacing:2px;

}

/* ANIMACIONES */

@keyframes fadeIn{

from{
opacity:0;
transform:scale(1.04);
}

to{
opacity:1;
transform:scale(1);
}

}

@keyframes slowFloat{

from{
transform:scale(1.02) translateY(0px);
}

to{
transform:scale(1.06) translateY(-12px);
}

}

@keyframes contentFade{

from{
opacity:0;
transform:translateX(-50%) translateY(20px);
}

to{
opacity:1;
transform:translateX(-50%) translateY(0px);
}

}

@keyframes floatText{

0%{

transform:
perspective(900px)
rotateX(18deg)
translateY(0px);

}

50%{

transform:
perspective(900px)
rotateX(18deg)
translateY(-8px);

}

100%{

transform:
perspective(900px)
rotateX(18deg)
translateY(0px);

}

}

@keyframes gradientMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

@keyframes titleFloat{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-6px);
}

100%{
transform:translateY(0px);
}

}

@keyframes cityGlow{

0%{
opacity:0.7;
}

50%{
opacity:1;
}

100%{
opacity:0.7;
}

}

@keyframes pulse{

0%{
opacity:0.5;
}

50%{
opacity:1;
}

100%{
opacity:0.5;
}

}

/* MOBILE */

@media (max-width:768px){

#artists3d{

top:30%;

gap:18px;

}

.artist{

font-size:15px;

letter-spacing:2px;

}

.btn{

min-width:200px;

font-size:11px;

letter-spacing:4px;

}

#cityTitle{

letter-spacing:8px;

}

}

</style>

</head>

<body>

<!-- ENTER -->

<div id="enterScreen">

<div id="enterText">

ENTER DIAMA

</div>

</div>

<!-- AUDIO -->

<audio id="bgMusic" loop>

<source
src="DiamaLoop.wav"
type="audio/wav">

</audio>

<!-- FONDO -->

<div id="background">

<img
src="FLAYER.jpg"
id="flyer">

<div id="overlay"></div>

<!-- TITULO -->

<div id="mainTitle">

<div id="diamaTitle">
DIAMA
</div>

<div id="cityTitle">
PACHUCA
</div>

</div>

<!-- ARTISTAS -->

<div id="artists3d">

<div class="artist">
andrésestr3s b2b FireflyLight
</div>

<div class="artist">
kinychbeat b2b Caparroso
</div>

<div class="artist">
Grupo Precario
</div>

<div class="artist">
BreakMadre & Caparroso presents:
Cumbia Extravaganza
</div>

</div>

</div>

<!-- BOTONES -->

<div id="content">

<button
class="btn"
onclick="window.open('https://maps.google.com')">

UBICACIÓN

</button>

<button
class="btn"
onclick="alert('AQUÍ PONES EL LINE UP')">

HORARIOS

</button>

<button
class="btn"
onclick="openVideo()">

TEASER

</button>

</div>

<!-- VIDEO -->

<div id="videoModal">

<button
id="closeBtn"
onclick="closeVideo()">

CERRAR

</button>

<video
id="videoPlayer"
controls
playsinline>

<source
src="DIAMATEASERWEB.mp4"
type="video/mp4">

</video>

</div>

<script>

const enterScreen =
document.getElementById("enterScreen");

const bgMusic =
document.getElementById("bgMusic");

const videoModal =
document.getElementById("videoModal");

const videoPlayer =
document.getElementById("videoPlayer");

/* ENTER */

enterScreen.onclick = async () => {

await bgMusic.play();

enterScreen.style.opacity = "0";

setTimeout(() => {

enterScreen.style.display = "none";

}, 1500);

};

/* ABRIR VIDEO */

function openVideo(){

bgMusic.pause();

videoModal.style.display = "flex";

videoPlayer.play();

}

/* CERRAR VIDEO */

function closeVideo(){

videoModal.style.display = "none";

videoPlayer.pause();

videoPlayer.currentTime = 0;

bgMusic.play();

}

</script>

</body>

</html>
